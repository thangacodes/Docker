apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
spec:
  type: {{ .Values.thangaaService.type }}
  selector:
    app: {{ .Release.Name }}
  ports:
    - port: {{ .Values.thangaaService.port }}
      targetPort: {{ .Values.thangaaService.targetPort }}
      nodePort: {{ .Values.thangaaService.nodePort }}